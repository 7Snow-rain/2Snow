; PlatformIO 项目配置文件
; ESP32-C3 + ML307C 4G 寻呼机
; 
; 使用方法：
;   1. VS Code 打开本文件夹
;   2. 点底部 PlatformIO 的 → 箭头（编译）
;   3. 插上 ESP32C3 到 USB
;   4. 点 → 箭头（烧录）

[env:esp32-c3-devkitc-02]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200

; 库依赖
lib_deps =
    ; U8G2 - 屏幕驱动库（ST7920 128x64）
    olikraus/U8G2 @ ^2.35.4
    ; ArduinoJson - JSON 解析
    bblanchon/ArduinoJson @ ^7.0.0
    ; ESP Async WebServer - Web 配置后台
    me-no-dev/ESP Async WebServer @ ^3.0.0
    ; AsyncTCP - 异步 TCP 库（WebServer 依赖）
    me-no-dev/AsyncTCP @ ^3.0.0

; 编译选项
build_flags =
    ; 启用所有警告
    -Wall
    ; 优化大小
    -Os

; 串口监视器
monitor_filters =
    time
    esp32_exception_decoder
